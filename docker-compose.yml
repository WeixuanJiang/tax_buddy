services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ato_kb_pg
    environment:
      POSTGRES_USER: ato
      POSTGRES_PASSWORD: ato
      POSTGRES_DB: ato_kb
    ports:
      - "5433:5432"          # host 5433 -> container 5432 (host tools / psql)
    volumes:
      - ato_kb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ato -d ato_kb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: ato_kb_api
    env_file: .env                 # OPENROUTER_API_KEY, OPENROUTER_MODEL, etc.
    environment:
      DATABASE_URL: postgresql://ato:ato@db:5432/ato_kb
      DATA_DIR: /app/output
    volumes:
      - ../output:/app/output:ro   # corpus (read-only)
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ato_kb_web
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  ato_kb_pgdata:
