services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ato_kb_pg
    environment:
      POSTGRES_USER: ato
      POSTGRES_PASSWORD: ato
      POSTGRES_DB: ato_kb
    ports:
      - "5433:5432"          # host 5433 -> container 5432 (host tools / psql)
    volumes:
      - ato_kb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ato -d ato_kb"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.20
    container_name: ato_kb_neo4j
    environment:
      # Password sourced from the environment (.env), never committed. Compose
      # errors out if NEO4J_PASSWORD is unset, so there is no weak default.
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?set NEO4J_PASSWORD in .env}
    ports:
      # Bound to loopback: reachable by host tools (demo, browser) but not off-host.
      - "127.0.0.1:7474:7474"   # browser UI
      - "127.0.0.1:7687:7687"   # bolt
    volumes:
      - ato_kb_neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: ato_kb_api
    env_file: .env                 # OPENROUTER_API_KEY, OPENROUTER_MODEL, AUTH_SECRET, NEO4J_PASSWORD, etc.
    environment:
      DATABASE_URL: postgresql://ato:ato@db:5432/ato_kb
      DATA_DIR: /app/output
      # Override the .env value (which targets localhost for host-run tools):
      # inside the compose network the api reaches Neo4j by service name.
      NEO4J_URI: bolt://neo4j:7687
    volumes:
      - ../output:/app/output:ro   # corpus (read-only)
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ato_kb_web
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  ato_kb_pgdata:
  ato_kb_neo4jdata:
