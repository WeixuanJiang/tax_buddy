server {
    listen 80;
    server_name _;

    # Static SPA
    root /usr/share/nginx/html;
    index index.html;

    # API proxy: /api/ask -> http://api:8000/ask  (trailing slash strips /api)
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;

        # Server-Sent Events: stream chunks through immediately, no buffering.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
    }

    location / {
        try_files $uri /index.html;
    }
}
